server:
  error:
    include-message: always

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  datasource:
    url: "jdbc:h2:mem:greentrails;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000;INIT=CREATE ALIAS IF NOT EXISTS H2GIS_SPATIAL FOR 'org.h2gis.functions.factory.H2GISFunctions.load'\\;CALL H2GIS_SPATIAL()"
    username: mock
    driver-class-name: org.h2.Driver
    hikari:
          minimum-idle: 1
          maximum-pool-size: 5
